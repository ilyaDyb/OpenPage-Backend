name: Deploy backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: true

env:
  DEPLOY_BRANCH: main
  SERVER_BACKEND_DIR: /root/open-page-server/OpenPage-backend
  SERVER_SHARED_ENV: /root/open-page-server/.env

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail

            cd "${{ env.SERVER_BACKEND_DIR }}"

            git pull --ff-only origin "${{ env.DEPLOY_BRANCH }}"

            if [ ! -f .env ]; then
              if [ ! -f "${{ env.SERVER_SHARED_ENV }}" ]; then
                echo "Shared env file not found: ${{ env.SERVER_SHARED_ENV }}"
                exit 1
              fi

              cp "${{ env.SERVER_SHARED_ENV }}" .env
            fi

            if docker compose version >/dev/null 2>&1; then
              docker compose up -d --build
            else
              docker-compose up -d --build
            fi

            docker image prune -f
