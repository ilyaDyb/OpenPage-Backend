services:
  db:
    image: postgres:14
    container_name: openpage_db
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_DB=openpage
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: openpage_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  web:
    build: .
    container_name: openpage_web
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    command: python -m core.open_page.devserver
    restart: always

  nginx:
    image: nginx:1.27-alpine
    container_name: openpage_nginx
    ports:
      - "80:80"
    environment:
      FRONTEND_UPSTREAM: ${FRONTEND_UPSTREAM:-host.docker.internal:7070}
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
      - static_volume:/var/www/openpage/static:ro
      - media_volume:/var/www/openpage/media:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - web
    restart: unless-stopped

volumes:
  postgres_data:
  static_volume:
  media_volume:
  redis_data:
