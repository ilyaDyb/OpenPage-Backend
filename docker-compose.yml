x-web-env: &web-env
  DEBUG: ${DEBUG:-True}
  DB_NAME: ${DB_NAME:-openpage}
  DB_USER: ${DB_USER:-postgres}
  DB_PASSWORD: ${DB_PASSWORD:-postgres}
  DB_HOST: ${DB_HOST:-db}
  DB_PORT: ${DB_PORT:-5432}
  USE_REDIS: ${USE_REDIS:-False}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/1}
  REDIS_HOST: ${REDIS_HOST:-redis}
  REDIS_PORT: ${REDIS_PORT:-6379}
  REDIS_DB: ${REDIS_DB:-1}
  API_SECRET_KEY: ${API_SECRET_KEY:-}
  DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME:-admin}
  DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL:-admin@example.com}
  DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD:-admin123}
  ALLOWED_HOSTS: ${ALLOWED_HOSTS:-127.0.0.1,localhost}
  EMAIL_HOST: ${EMAIL_HOST:-smtp.gmail.com}
  EMAIL_PORT: ${EMAIL_PORT:-587}
  EMAIL_USE_TLS: ${EMAIL_USE_TLS:-True}
  EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
  EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
  DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-}
  TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
  TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL:-}
  TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-OpenPageAuthBot}
  MAX_AVATAR_UPLOAD_SIZE: ${MAX_AVATAR_UPLOAD_SIZE:-2097152}
  MAX_COVER_UPLOAD_SIZE: ${MAX_COVER_UPLOAD_SIZE:-5242880}
  MAX_BOOK_UPLOAD_SIZE: ${MAX_BOOK_UPLOAD_SIZE:-26214400}
  DATA_UPLOAD_MAX_MEMORY_SIZE: ${DATA_UPLOAD_MAX_MEMORY_SIZE:-33554432}
  FILE_UPLOAD_MAX_MEMORY_SIZE: ${FILE_UPLOAD_MAX_MEMORY_SIZE:-5242880}
  DEVSERVER_POLL_SECONDS: ${DEVSERVER_POLL_SECONDS:-1}

services:
  db:
    image: postgres:14
    container_name: openpage_db
    volumes:
      - postgres_data:/var/lib/postgresql/data/
      - ./docker/postgres-entrypoint.sh:/usr/local/bin/openpage-postgres-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/openpage-postgres-entrypoint.sh"]
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_DB: ${DB_NAME:-openpage}
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=\"$${POSTGRES_PASSWORD}\" psql -h 127.0.0.1 -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\" -c 'SELECT 1' >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: openpage_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  web:
    build: .
    container_name: openpage_web
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy
    environment:
      <<: *web-env
    command: python -m core.open_page.devserver
    restart: always

  nginx:
    image: nginx:1.27-alpine
    container_name: openpage_nginx
    ports:
      - "80:80"
    environment:
      FRONTEND_UPSTREAM: ${FRONTEND_UPSTREAM:-host.docker.internal:7070}
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
      - static_volume:/var/www/openpage/static:ro
      - media_volume:/var/www/openpage/media:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - web
    restart: unless-stopped

volumes:
  postgres_data:
  static_volume:
  media_volume:
  redis_data:
